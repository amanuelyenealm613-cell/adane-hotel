<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አዳነ ኢንተርናሽናል ሆቴል | Adane International Hotel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root {
            --primary-gold: #dfb15b;
            --dark-bg: #111111;
            --light-bg: #f7f5f0;
            --text-dark: #2c3e50;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
            --card-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            padding-bottom: 80px;
        }

        /* የድሮው ዋና ዲዛይንና መዋቅር */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .hotel-title {
            text-align: center;
            color: var(--primary-gold);
            margin: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .section-title {
            color: var(--primary-gold);
            font-size: 20px;
            margin: 25px 0 15px 0;
            border-bottom: 1px solid var(--primary-gold);
            padding-bottom: 5px;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--card-shadow);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
        }

        .item-text h3 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .item-text p {
            color: var(--primary-gold);
            font-weight: bold;
            font-size: 16px;
        }

        .add-btn {
            background-color: var(--primary-gold);
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background-color: #c99f4f;
        }

        /* Floating Cart Bar */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--primary-gold);
            color: #000000;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background-color: #1a1a1a;
            border: 1px solid var(--primary-gold);
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            margin: 40px auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .modal-header h2 {
            color: var(--primary-gold);
            font-size: 20px;
        }

        .close-btn {
            color: #ffffff;
            font-size: 28px;
            cursor: pointer;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 15px;
        }

        .billing-form {
            margin-top: 25px;
            border-top: 2px dashed #333;
            padding-top: 20px;
        }

        .billing-form h3 {
            color: var(--primary-gold);
            font-size: 18px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #222;
            color: white;
            font-size: 15px;
        }

        .form-group input[type="file"] {
            padding: 8px;
            background-color: #111;
            border: 1px dashed var(--primary-gold);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-gold);
            color: black;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        .submit-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        #loading {
            display: none;
            color: var(--primary-gold);
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hotel-title">አዳነ ኢንተርናሽናል ሆቴል</div>

        <div class="section-title">የተመረጡ ምግቦች</div>
        <div class="menu-list">
            <div class="menu-item">
                <div class="item-info">
                    <img class="item-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=200" alt="ልዩ በየአይነቱ">
                    <div class="item-text">
                        <h3>ልዩ በየአይነቱ</h3>
                        <p>250 ETB</p>
                    </div>
                </div>
                <button class="add-btn" onclick="addToCart('ልዩ በየአይነቱ', 250)">ወደ ካርት ጨምር</button>
            </div>

            <div class="menu-item">
                <div class="item-info">
                    <img class="item-img" src="https://images.unsplash.com/photo-1603360946369-dc9bb6258143?q=80&w=200" alt="ልዩ ክትፎ">
                    <div class="item-text">
                        <h3>ልዩ ክትፎ</h3>
                        <p>450 ETB</p>
                    </div>
                </div>
                <button class="add-btn" onclick="addToCart('ልዩ ክትፎ', 450)">ወደ ካርት ጨምር</button>
            </div>

            <div class="menu-item">
                <div class="item-info">
                    <img class="item-img" src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=200" alt="የበግ ለጋ ጥብስ">
                    <div class="item-text">
                        <h3>የበግ ለጋ ጥብስ</h3>
                        <p>380 ETB</p>
                    </div>
                </div>
                <button class="add-btn" onclick="addToCart('የበግ ለጋ ጥብስ', 380)">ወደ ካርት ጨምር</button>
            </div>
        </div>

        <div class="section-title">መጠጦች</div>
        <div class="menu-list">
            <div class="menu-item">
                <div class="item-info">
                    <img class="item-img" src="https://images.unsplash.com/photo-1608897013039-887f21d8c804?q=80&w=200" alt="ለስላሳ መጠጦች">
                    <div class="item-text">
                        <h3>ለስላሳ መጠጦች</h3>
                        <p>40 ETB</p>
                    </div>
                </div>
                <button class="add-btn" onclick="addToCart('ለስላሳ መጠጦች', 40)">ወደ ካርት ጨምር</button>
            </div>

            <div class="menu-item">
                <div class="item-info">
                    <img class="item-img" src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=200" alt="ሀበሻ ቢራ">
                    <div class="item-text">
                        <h3>ሀበሻ ቢራ</h3>
                        <p>70 ETB</p>
                    </div>
                </div>
                <button class="add-btn" onclick="addToCart('ሀበሻ ቢራ', 70)">ወደ ካርት ጨምር</button>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar" style="display: none;" onclick="openCart()">
        <span id="cart-count">የተመረጡ እቃዎች፡ 0</span>
        <span id="cart-total">ጠቅላላ፡ 0 ETB</span>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>የመረጧቸው ነገሮች ዝርዝር</h2>
                <span class="close-btn" onclick="closeCart()">&times;</span>
            </div>
            
            <div id="cart-items-container"></div>

            <div class="billing-form">
                <h3>የክፍያ እና የማድረሻ መረጃ</h3>
                
                <div class="form-group">
                    <label for="customer-name">የደንበኛ ሙሉ ስም</label>
                    <input type="text" id="customer-name" placeholder="ስምዎን እዚህ ያስገቡ" required>
                </div>

                <div class="form-group">
                    <label for="fayda-phone">የስልክ ቁጥር (ለክፍያ ማረጋገጫ የሚያገለግል)</label>
                    <input type="tel" id="fayda-phone" placeholder="+2519..." required>
                </div>

                <div class="form-group">
                    <label for="fayda-qr">የፋይዳ (Fayda) QR ኮድ ወይም የክፍያ ማረጋገጫ ፎቶ</label>
                    <input type="file" id="fayda-qr" accept="image/*" required>
                </div>

                <button class="submit-btn" id="submit-order-btn" onclick="submitOrder()">ትዕዛዝህን በቋሚነት ላክ</button>
                <div id="loading">እባክዎ ይጠብቁ... መረጃው እየተጫነ ነው...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. የFIREBASE መረጃ ማስተካከያ ክፍል ---
        const firebaseConfig = {
            apiKey: "AIzaSyCm6vPlapGOIn95I3NER6t1g3FHR1xKI3g",
            authDomain: "adane-hotel.firebaseapp.com",
            databaseURL: "https://adane-hotel-default-rtdb.firebaseio.com",
            projectId: "adane-hotel",
            storageBucket: "adane-hotel.firebasestorage.app",
            messagingSenderId: "92228467802",
            appId: "1:92228467802:web:609bc388c80ca75b77ec63",
            measurementId: "G-RX5ZNTXY9D"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const database = firebase.database();
        const storage = firebase.storage();

        // --- 2. የቴሌግራም ቦት መረጃ ---
        const TELEGRAM_BOT_TOKEN = '8946873289:AAHcg_T-YKH9inigawSa_ZqD9S3EwUunY9w'; 
        const TELEGRAM_CHAT_ID = '8946873289'; 

        // --- 3. የካርት (Cart) ሲስተም ጃቫስክሪፕት ---
        let cart = [];

        function addToCart(name, price) {
            let existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name: name, price: price, quantity: 1 });
            }
            updateCartBar();
        }

        function updateCartBar() {
            const cartBar = document.getElementById('cart-bar');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');
            
            let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if (totalItems > 0) {
                cartBar.style.display = 'flex';
                cartCount.innerText = `የተመረጡ እቃዎች፦ ${totalItems}`;
                cartTotal.innerText = `ጠቅላላ፦ ${totalPrice} ETB`;
            } else {
                cartBar.style.display = 'none';
            }
        }

        function openCart() {
            document.getElementById('cart-modal').style.display = 'block';
            renderCartItems();
        }

        function closeCart() {
            document.getElementById('cart-modal').style.display = 'none';
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">ካርትዎ ባዶ ነው!</p>';
                return;
            }

            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = 'cart-item-row';
                row.innerHTML = `
                    <span>${item.name} (x${item.quantity})</span>
                    <span>${item.price * item.quantity} ETB</span>
                `;
                container.appendChild(row);
            });
        }

        // --- 4. ትዕዛዝ ወደ FIREBASE እና ቴሌግራም መላክ ---
        function submitOrder() {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('fayda-phone').value;
            const qrFileInput = document.getElementById('fayda-qr');
            const submitBtn = document.getElementById('submit-order-btn');
            const loadingText = document.getElementById('loading');

            if (!name || !phone) {
                alert("እባክዎ ስም እና ስልክ ቁጥር በትክክል ያስገቡ!");
                return;
            }

            if (qrFileInput.files.length === 0) {
                alert("እባክዎ የፋይዳ QR ኮድ ወይም የክፍያ ማረጋገጫ ፎቶ ያያይዙ!");
                return;
            }

            if (cart.length === 0) {
                alert("የመረጡት ምንም እቃ የለም!");
                return;
            }

            submitBtn.disabled = true;
            loadingText.style.display = 'block';

            const file = qrFileInput.files[0];
            const orderId = 'ORD_' + Date.now();
            
            const storageRef = storage.ref('fayda_qr_codes/' + orderId + '_' + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                null, 
                (error) => {
                    console.error("ፎቶ መጫን አልተሳካም:", error);
                    alert("ፎቶውን መጫን አልተቻለም፣ እባክዎ በድጋሚ ይሞክሩ።");
                    submitBtn.disabled = false;
                    loadingText.style.display = 'none';
                }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                        let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                        
                        const orderData = {
                            orderId: orderId,
                            customerName: name,
                            customerPhone: phone,
                            faydaQrUrl: downloadURL,
                            items: cart,
                            totalAmount: totalPrice,
                            status: "pending",
                            timestamp: firebase.database.ServerValue.TIMESTAMP
                        };

                        database.ref('orders/' + orderId).set(orderData, (error) => {
                            if (error) {
                                alert("ትዕዛዙን መመዝገብ አልተቻለም: " + error.message);
                                submitBtn.disabled = false;
                                loadingText.style.display = 'none';
                            } else {
                                sendTelegramNotification(orderData);
                            }
                        });
                    });
                }
            );
        }

        function sendTelegramNotification(order) {
            let itemsText = order.items.map(i => `- ${i.name} (x${i.quantity})`).join('\n');
            
            let message = `🔔 *አዲስ ትዕዛዝ ደርሷል!*\n\n`;
            message += `🆔 *ትዕዛዝ መለያ:* \`${order.orderId}\`\n`;
            message += `👤 *ደንበኛ:* ${order.customerName}\n`;
            message += `📞 *ስልክ ቁጥር:* ${order.customerPhone}\n\n`;
            message += `🛍️ *የታዘዙ እቃዎች:*\n${itemsText}\n\n`;
            message += `💰 *ጠቅላላ ክፍያ:* ${order.totalAmount} ETB\n`;
            message += `🖼️ *የክፍያ/QR ፎቶ ሊንክ:* [ፎቶውን እዚህ ይክፈቱ](${order.faydaQrUrl})\n`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                alert("🎉 ትዕዛዝዎ በስኬት ተልኳል! እናመሰግናለን።");
                cart = [];
                updateCartBar();
                closeCart();
                document.getElementById('customer-name').value = '';
                document.getElementById('fayda-phone').value = '';
                document.getElementById('fayda-qr').value = '';
                
                document.getElementById('submit-order-btn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            })
            .catch(err => {
                console.error("ቴሌግራም መልዕክት መላክ አልቻለም:", err);
                alert("🎉 ትዕዛዝዎ በስኬት ተመዝግቧል!");
                cart = [];
                updateCartBar();
                closeCart();
                document.getElementById('submit-order-btn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            });
        }
    </script>
</body>
</html>
